services:
  # 1. ฐานข้อมูล (รันปกติ)
  db:
    image: mariadb:10.6
    container_name: event-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: event_db
      TZ: Asia/Bangkok
    command: --default-time-zone="+07:00"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - event-net

  # 2. phpMyAdmin (รันที่พอร์ต 8082)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: event-phpmyadmin
    restart: always
    depends_on:
      - db
    ports:
      - "8082:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: rootpassword
    networks:
      - event-net

  # 3. เว็บเซิร์ฟเวอร์ (เปิดผ่านพอร์ต 8087)
  web:
    image: php:8.1-apache
    container_name: event-web
    restart: always
    ports:
      - "8087:80" # <-- เรียกเปิดเว็บหลักผ่านลิงก์ http://localhost:8087
    volumes:
      - .:/var/www/html
    command: >
      sh -c "chmod -R 777 /var/www/html && 
      echo 'ServerName localhost' >> /etc/apache2/apache2.conf && 
      docker-php-ext-install pdo pdo_mysql && 
      apache2-foreground"
    networks:
      - event-net
      
  # 4. ตัวจัดการไฟล์ (รันที่พอร์ต 8099 จัดการไฟล์ของเว็บหลัก)
  filemanager:
    image: filebrowser/filebrowser:latest
    container_name: event-filemanager
    user: "0:0"
    restart: always
    ports:
      - "8099:80" # <-- เรียกจัดการไฟล์ผ่านลิงก์ http://localhost:8099
    volumes:
      - .:/srv # แมปโฟลเดอร์ปัจจุบันเข้ามา
    networks:
      - event-net
    entrypoint: >
      sh -c "
      chmod -R 777 /srv &&
      rm -f /tmp/filebrowser.db &&
      filebrowser config init --database=/tmp/filebrowser.db &&
      filebrowser users add admin admin12345678 --perm.admin=true --database=/tmp/filebrowser.db &&
      filebrowser --root=/srv --database=/tmp/filebrowser.db --address=0.0.0.0 --port=80"

  # 5. แอปสแกนเนอร์ (พอร์ต 3001)
  scanner-app:
    image: node:18-alpine
    container_name: event-scanner
    restart: always
    working_dir: /app
    ports:
      - "3001:3001"
    environment:
      TZ: Asia/Bangkok
    volumes:
      - ./scanner-app:/app
    depends_on:
      - db
    command: sh -c "npm install && npm start"
    networks:
      - event-net

networks:
  event-net:
    driver: bridge

volumes:
  db_data:
