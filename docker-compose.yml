version: '3.8'

services:
  # บริการฐานข้อมูล MySQL
  db:
    image: mysql:8.0
    container_name: ropa_mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password_1234
      MYSQL_DATABASE: ropa_db
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # (ไม่บังคับ) ถ้าอยากให้สร้าง Table อัตโนมัติตั้งแต่เปิดตู้ สามารถนำสคริปต์ SQL ไปวางในโฟลเดอร์ initdb ได้
      # - ./init.sql:/docker-entrypoint-initdb.dir/init.sql
    networks:
      - ropa_network

  # บริการเว็บแอปพลิเคชัน Flask
  web:
    build: .
    container_name: ropa_web_app
    restart: always
    ports:
      - "8078:80"
    environment:
      - FLASK_ENV=development
    # ให้รอจนกว่า db จะพร้อมทำงาน ค่อยเปิดตัวเว็บ
    depends_on:
      - db
    networks:
      - ropa_network

volumes:
  mysql_data: # เก็บข้อมูล MySQL ไว้ในเครื่อง ไม่ให้หายเวลาปิด container

networks:
  ropa_network: # วงเน็ตเวิร์กจำลองให้ตู้คุยกันเองได้
